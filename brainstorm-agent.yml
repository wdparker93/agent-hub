# Agent Hub — Weekly Brainstorm Pipeline
#
# Runs every Monday at 9am UTC. Calls Claude to generate 5-7 monetizable
# app/product ideas spanning broad market categories (not interest-limited)
# and emails a digest to the developer.
#
# Required variable group: agent-hub (link in Pipeline > Edit > Variables > Variable groups)
#   ANTHROPIC_API_KEY  — Anthropic API key
#   GMAIL_ADDRESS      — Gmail address to poll and reply from
#   GMAIL_APP_PASSWORD — Google app password (16 chars, not login password)

trigger: none   # Only runs on schedule below

schedules:
  - cron: "0 9 * * 1"
    displayName: Generate app ideas every Monday at 9am UTC
    branches:
      include:
        - main
    always: true   # Run even if no new commits

variables:
  - group: agent-hub

pool:
  vmImage: ubuntu-latest

steps:

  - checkout: self
    displayName: Checkout agent-hub

  - task: UsePythonVersion@0
    displayName: Use Python 3.11
    inputs:
      versionSpec: '3.11'
      addToPath: true

  - script: pip install -r requirements.txt
    displayName: Install dependencies
    workingDirectory: $(Build.SourcesDirectory)

  - script: python brainstorm_agent.py
    displayName: Run brainstorm agent
    workingDirectory: $(Build.SourcesDirectory)
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
      GMAIL_ADDRESS: $(GMAIL_ADDRESS)
      GMAIL_APP_PASSWORD: $(GMAIL_APP_PASSWORD)
